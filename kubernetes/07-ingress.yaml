apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bluegreen-ingress
  namespace: bluegreen
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
  - host: "blue.local"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-blue-service
            port:
              number: 3001
  - host: "green.local"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-green-service
            port:
              number: 3004
  - host: "api.local"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 5000
