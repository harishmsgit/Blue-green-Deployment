apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-blue
  namespace: bluegreen
  labels:
    app: frontend
    version: blue
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: frontend
      version: blue
  template:
    metadata:
      labels:
        app: frontend
        version: blue
    spec:
      containers:
      - name: frontend-blue
        image: blue-green-deployment-frontend-blue:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "3001"
        - name: BACKEND_URL
          valueFrom:
            configMapKeyRef:
              name: bluegreen-config
              key: BACKEND_URL
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: bluegreen-config
              key: NODE_ENV
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 25
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        startupProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "250m"
---

apiVersion: v1
kind: Service
metadata:
  name: frontend-blue-service
  namespace: bluegreen
  labels:
    app: frontend
    version: blue
spec:
  type: NodePort
  selector:
    app: frontend
    version: blue
  ports:
  - port: 3001
    targetPort: 3001
    protocol: TCP
    nodePort: 30001
    name: http
